<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nie ma takiej strony — AutoFiszki</title>
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#0b1020">
  <link rel="icon" type="image/png" sizes="192x192" href="/img/icon-192.png">
  <!-- Style celowo inline: strona 404 może być serwowana z dowolnej ścieżki -->
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Inter", system-ui, -apple-system, "Segoe UI", sans-serif;
      background: #0b1020;
      color: #eef1fb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      line-height: 1.6;
    }
    .code {
      font-size: 5rem;
      font-weight: 900;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #818cf8, #5eead4);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    h1 { font-size: 1.4rem; font-weight: 700; margin: 8px 0 10px; }
    p { color: #a8b1cf; margin-bottom: 28px; }
    a {
      display: inline-block;
      padding: 13px 28px;
      border-radius: 999px;
      background: linear-gradient(135deg, #818cf8, #5eead4);
      color: #0b1020;
      font-weight: 700;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <div class="code">404</div>
    <h1>Nie ma takiej strony</h1>
    <p>Ta fiszka jeszcze nie istnieje albo została przeniesiona.</p>
    <a href="/">Wróć na stronę główną</a>
  </main>
</body>
</html>
